#[seek]
RIGHT seek  1 exact
LEFT  seek -1 exact
SHIFT+RIGHT seek  5 exact
SHIFT+LEFT  seek -5 exact
CTRL+RIGHT seek  60 exact
CTRL+LEFT  seek -60 exact
a seek 0 absolute

#[volume]
KP_ADD add volume 1
KP_SUBTRACT add volume -1
F1 cycle mute
F2 add volume -2
F3 add volume 2

#[playlist]
F4 script-binding select/select-playlist
F6 cycle mute
F5 playlist-prev
F7 playlist-next

HOME add chapter -1
END add chapter 1

#[speed]
4 set speed 1
2 multiply speed 1/1.1
3 multiply speed 1.1

#[rotate]
t cycle ontop
r cycle_values video-rotate "90" "180" "270" "0"

#[misc]
s no-osd cycle pause
SPACE show-progress

x script-binding stats/display-stats-toggle

1 script-binding select/select-chapter
i show-text ${track-list}

w script-binding select/menu
e cycle-values loop-file "inf" "no"

#[sub]
5 add sub-delay -0.1
6 add sub-delay 0.1
